<!--
  BankStack — Wazuh Manager Configuration
  Optimized for Bangladesh Banking SOC Operations
-->
<ossec_config>

  <!-- Global Settings -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.com</smtp_server>
    <email_from>bankstack-soc@example.com</email_from>
    <email_to>soc-team@example.com</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- Rules -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <!-- Custom banking rules -->
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

  <!-- Syslog Input — Receives logs from Banking Log Simulator -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>172.25.0.0/24</allowed-ips>
  </remote>

  <!-- Agent Connection -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Syslog Output to Splunk -->
  <syslog_output>
    <server>172.25.0.20</server>
    <port>9515</port>
    <format>json</format>
    <level>3</level>
  </syslog_output>

  <!-- File Integrity Monitoring — Banking Critical Paths -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- SWIFT Alliance Directories -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/swift</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/swift/alliance</directories>

    <!-- Core Banking System Directories -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/cbs</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/ababil</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/flora</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/stelar</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/tcs-bancs</directories>

    <!-- Payment Gateway Directories -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/beftn</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/npsb</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/rtgs</directories>

    <!-- ATM/POS Software -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/opt/atm</directories>

    <!-- Critical System Files -->
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>

    <!-- Ignore patterns -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>

    <!-- File size limit -->
    <max_eps>200</max_eps>
  </syscheck>

  <!-- Vulnerability Detection -->
  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <min_full_scan_interval>6h</min_full_scan_interval>
    <run_on_start>yes</run_on_start>
    <provider name="canonical">
      <enabled>yes</enabled>
      <os>focal</os>
      <os>jammy</os>
      <os>noble</os>
      <update_interval>1h</update_interval>
    </provider>
    <provider name="nvd">
      <enabled>yes</enabled>
      <update_from_year>2024</update_from_year>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <!-- Active Response Configurations -->
  <command>
    <name>brute-force-lockout</name>
    <executable>brute-force-lockout.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <command>
    <name>webshell-quarantine</name>
    <executable>webshell-quarantine.sh</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <command>
    <name>swift-lockdown</name>
    <executable>swift-lockdown.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- Active Responses -->
  <active-response>
    <command>brute-force-lockout</command>
    <location>local</location>
    <rules_id>100110</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <active-response>
    <command>webshell-quarantine</command>
    <location>local</location>
    <rules_id>100130</rules_id>
  </active-response>

  <active-response>
    <command>swift-lockdown</command>
    <location>local</location>
    <rules_id>100201,100202</rules_id>
    <timeout>7200</timeout>
  </active-response>

  <!-- Log Analysis — Banking Application Logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Security Configuration Assessment -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- Auth settings -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ssl_agent_ca>/etc/ssl/root-ca.pem</ssl_agent_ca>
  </auth>

</ossec_config>
