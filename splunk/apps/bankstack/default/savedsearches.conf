# ================================================================
# BankStack — SPL Correlation Searches for Bangladesh Banking
# 25+ searches covering banking-specific threat scenarios
# ================================================================

# ----------------------------------------------------------------
# 1. Authentication Attacks
# ----------------------------------------------------------------

[BankStack - Brute Force on Critical Systems]
search = index=bankstack_wazuh rule.groups{}="brute_force" rule.groups{}="critical_system" \
| stats count by data.srcip, data.system, rule.description \
| where count >= 5 \
| sort -count
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = data.srcip
description = Detects brute force attacks targeting CBS, SWIFT, or RTGS systems

[BankStack - Distributed Brute Force]
search = index=bankstack_wazuh action="LOGIN_FAILED" \
| stats dc(data.srcip) as unique_ips, count by user \
| where unique_ips >= 3 AND count >= 10 \
| sort -unique_ips
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 4
description = Same user targeted from multiple IPs — credential stuffing or distributed brute force

[BankStack - After Hours Critical Login]
search = index=bankstack_wazuh action="LOGIN_SUCCESS" (data.system="CBS" OR data.system="SWIFT" OR data.system="RTGS") \
| eval hour=strftime(_time, "%H") \
| where hour >= 22 OR hour < 6 \
| stats count by user, data.system, data.srcip \
| sort -count
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 22-23,0-6 * * *
enableSched = 1
alert.severity = 3
description = Login to critical banking system outside business hours (10 PM - 6 AM BST)

[BankStack - Non-BD IP Critical Access]
search = index=bankstack_wazuh action="LOGIN_SUCCESS" data.source_country!="BD" \
(data.system="CBS" OR data.system="SWIFT" OR data.system="RTGS" OR data.system="BEFTN") \
| stats count by user, data.srcip, data.source_country, data.system \
| sort -count
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 4
description = Non-Bangladesh IP accessing critical banking infrastructure

# ----------------------------------------------------------------
# 2. SWIFT Threat Detection
# ----------------------------------------------------------------

[BankStack - SWIFT After Hours Transfer]
search = index=bankstack_wazuh action="SWIFT_MSG_SENT" \
| eval hour=strftime(_time, "%H") \
| where hour >= 22 OR hour < 6 \
| table _time, user, data.msg_type, data.sender_bic, data.receiver_bic, data.amount_usd
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 22-23,0-6 * * *
enableSched = 1
alert.severity = 5
description = SWIFT message sent outside business hours — potential Bangladesh Bank heist pattern

[BankStack - SWIFT High Value Transfer]
search = index=bankstack_wazuh action="SWIFT_MSG_SENT" data.amount_usd>=1000000 \
| stats sum(data.amount_usd) as total_usd, count by user, data.dest_country \
| sort -total_usd
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 4
description = High-value SWIFT transfers exceeding $1M threshold

[BankStack - SWIFT Sanctioned Country]
search = index=bankstack_wazuh action="SWIFT_MSG_SENT" \
(data.dest_country="KP" OR data.dest_country="IR" OR data.dest_country="SY" OR data.dest_country="CU") \
| table _time, user, data.dest_country, data.receiver_bic, data.amount_usd
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.severity = 5
description = SWIFT transfer to OFAC/BB sanctioned country

[BankStack - SWIFT Rapid Burst]
search = index=bankstack_wazuh action="SWIFT_MSG_SENT" \
| bucket _time span=5m \
| stats count by _time, user \
| where count >= 5 \
| sort -count
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 4
description = Rapid SWIFT message burst — possible automated/malware-driven transfers

# ----------------------------------------------------------------
# 3. CBS Transaction Fraud
# ----------------------------------------------------------------

[BankStack - CBS High Value After Hours]
search = index=bankstack_wazuh action="CBS_TRANSACTION" (data.txn_type="transfer" OR data.txn_type="withdrawal") \
| eval hour=strftime(_time, "%H"), amount=tonumber(data.amount_bdt) \
| where (hour >= 22 OR hour < 6) AND amount >= 1000000 \
| stats sum(amount) as total_bdt, count by user, data.branch
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 22-23,0-6 * * *
enableSched = 1
alert.severity = 4
description = High-value CBS fund transfer/withdrawal after business hours

[BankStack - CBS Rapid Transactions]
search = index=bankstack_wazuh action="CBS_TRANSACTION" \
| bucket _time span=1m \
| stats count, sum(tonumber(data.amount_bdt)) as total_bdt by _time, user \
| where count >= 10 \
| sort -count
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 3
description = Rapid CBS transactions from single operator — possible automation or fraud

[BankStack - CBS Maker Checker Bypass]
search = index=bankstack_wazuh action="CBS_BATCH_OVERRIDE" OR action="MAKER_CHECKER_BYPASS" \
| stats count by user, data.system \
| sort -count
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
enableSched = 1
alert.severity = 4
description = Maker-checker dual control bypassed in CBS

[BankStack - CBS Backdated Transaction]
search = index=bankstack_wazuh action="CBS_BACKDATED_TXN" \
| table _time, user, data.account, data.amount_bdt, data.branch
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 */6 * * *
enableSched = 1
alert.severity = 4
description = Backdated transaction posted in CBS — potential fraud indicator

# ----------------------------------------------------------------
# 4. MFS Fraud (bKash/Nagad/Rocket)
# ----------------------------------------------------------------

[BankStack - MFS Large Cashout Unusual Hours]
search = index=bankstack_wazuh action="MFS_TRANSACTION" data.txn_type="cashout" \
| eval hour=strftime(_time, "%H"), amount=tonumber(data.amount_bdt) \
| where (hour >= 23 OR hour < 5) AND amount >= 50000 \
| stats count, sum(amount) as total_bdt by data.phone_number, data.provider
dispatch.earliest_time = -6h
dispatch.latest_time = now
cron_schedule = 0 23,0,1,2,3,4,5 * * *
enableSched = 1
alert.severity = 4
description = Large MFS cashout at unusual hours — potential fraud/money laundering

[BankStack - MFS PIN Brute Force]
search = index=bankstack_wazuh action="MFS_PIN_FAILED" \
| stats count by data.phone_number, data.provider \
| where count >= 5 \
| sort -count
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 4
description = MFS PIN brute force — 5+ failures per phone number

[BankStack - MFS SIM Swap Detection]
search = index=bankstack_wazuh action="MFS_SIM_SWAP" \
| table _time, data.phone_number, data.provider, data.agent_id
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 */2 * * *
enableSched = 1
alert.severity = 4
description = SIM swap detected for MFS-linked number — account takeover risk

[BankStack - MFS Smurfing Pattern]
search = index=bankstack_wazuh action="MFS_TRANSACTION" data.txn_type="send_money" \
| eval amount=tonumber(data.amount_bdt) \
| where amount > 20000 AND amount < 25000 \
| bucket _time span=1h \
| stats count, sum(amount) as total_bdt by _time, data.phone_number \
| where count >= 5 \
| sort -total_bdt
dispatch.earliest_time = -6h
dispatch.latest_time = now
cron_schedule = 0 */2 * * *
enableSched = 1
alert.severity = 3
description = MFS transaction structuring — multiple just-under-limit transfers (smurfing)

# ----------------------------------------------------------------
# 5. BEFTN/NPSB/RTGS
# ----------------------------------------------------------------

[BankStack - BEFTN Smurfing Pattern]
search = index=bankstack_wazuh action="BEFTN_TRANSFER" \
| bucket _time span=10m \
| stats count, sum(tonumber(data.amount_bdt)) as total_bdt by _time, data.source_account \
| where count >= 20 \
| sort -total_bdt
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 4
description = BEFTN smurfing — 20+ transfers from same account in 10 minutes

[BankStack - RTGS Outside Settlement Window]
search = index=bankstack_wazuh action="RTGS_TRANSFER" \
| eval hour=strftime(_time, "%H"), min=strftime(_time, "%M") \
| where hour >= 17 OR hour < 9 \
| table _time, user, data.source_bank, data.dest_bank, data.amount_bdt
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 17-23,0-8 * * *
enableSched = 1
alert.severity = 4
description = RTGS transfer attempted outside Bangladesh Bank settlement window

[BankStack - NPSB Card Rapid Transfers]
search = index=bankstack_wazuh action="NPSB_TRANSFER" \
| bucket _time span=5m \
| stats count, sum(tonumber(data.amount_bdt)) as total_bdt by _time, data.card_number \
| where count >= 10 \
| sort -total_bdt
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 3
description = Rapid NPSB transfers from same card

# ----------------------------------------------------------------
# 6. ATM/Card Fraud
# ----------------------------------------------------------------

[BankStack - ATM Jackpotting Pattern]
search = index=bankstack_wazuh action="ATM_JACKPOTTING" OR \
(action="ATM_WITHDRAWAL" \
| bucket _time span=5m \
| stats count, sum(tonumber(data.amount_bdt)) as total by _time, data.atm_id \
| where count >= 10) \
| table _time, data.atm_id, data.atm_location, count, total
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 5
description = ATM jackpotting attack — rapid max-value withdrawals from single ATM

[BankStack - Card Country Mismatch]
search = index=bankstack_wazuh (action="CARD_COUNTRY_MISMATCH" OR action="CARD_NOT_PRESENT_FRAUD") \
| stats count by data.card_number, data.country \
| where count >= 2 \
| sort -count
dispatch.earliest_time = -6h
dispatch.latest_time = now
cron_schedule = 0 */2 * * *
enableSched = 1
alert.severity = 3
description = Card fraud — usage in country different from card issuance

# ----------------------------------------------------------------
# 7. Data Exfiltration & Insider Threat
# ----------------------------------------------------------------

[BankStack - Large Data Upload Banking Network]
search = index=bankstack_wazuh action="LARGE_UPLOAD" \
| eval bytes_gb=tonumber(data.bytes)/1073741824 \
| where bytes_gb >= 1 \
| table _time, data.srcip, data.dstip, bytes_gb, data.target_zone
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.severity = 4
description = Large data upload from banking network — potential exfiltration

[BankStack - Bulk CBS Database Query]
search = index=bankstack_wazuh action="BULK_QUERY" \
| eval records=tonumber(data.records) \
| where records >= 10000 \
| table _time, user, data.system, records
dispatch.earliest_time = -6h
dispatch.latest_time = now
cron_schedule = 0 */3 * * *
enableSched = 1
alert.severity = 4
description = Bulk database extraction from CBS — insider threat indicator

[BankStack - Terminated Employee Login]
search = index=bankstack_wazuh action="LOGIN_SUCCESS" data.user_status="terminated" \
| table _time, user, data.srcip, data.system
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 */4 * * *
enableSched = 1
alert.severity = 5
description = Terminated employee account still active and logging in

